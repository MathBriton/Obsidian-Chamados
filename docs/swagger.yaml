basePath: /
definitions:
  internal_handlers.addTeamMemberRequest:
    properties:
      user_id:
        type: integer
    required:
    - user_id
    type: object
  internal_handlers.assignableListResponse:
    properties:
      users:
        items:
          $ref: '#/definitions/internal_handlers.assignableUser'
        type: array
    type: object
  internal_handlers.assignableUser:
    properties:
      id:
        type: integer
      name:
        type: string
      role:
        type: string
    type: object
  internal_handlers.authResponse:
    properties:
      access_token:
        type: string
      refresh_token:
        type: string
      tenant:
        $ref: '#/definitions/internal_handlers.tenantResponse'
      user:
        $ref: '#/definitions/internal_handlers.userResponse'
    type: object
  internal_handlers.categoryListResponse:
    properties:
      categories:
        items:
          $ref: '#/definitions/internal_handlers.categoryResponse'
        type: array
    type: object
  internal_handlers.categoryResponse:
    properties:
      id:
        type: integer
      name:
        type: string
    type: object
  internal_handlers.commentListResponse:
    properties:
      comments:
        items:
          $ref: '#/definitions/internal_handlers.commentResponse'
        type: array
    type: object
  internal_handlers.commentResponse:
    properties:
      author_id:
        type: integer
      body:
        type: string
      created_at:
        type: string
      id:
        type: integer
      is_internal:
        type: boolean
      ticket_id:
        type: integer
    type: object
  internal_handlers.createCategoryRequest:
    properties:
      name:
        type: string
    required:
    - name
    type: object
  internal_handlers.createCommentRequest:
    properties:
      body:
        minLength: 1
        type: string
      is_internal:
        type: boolean
    required:
    - body
    type: object
  internal_handlers.createTeamRequest:
    properties:
      name:
        type: string
    required:
    - name
    type: object
  internal_handlers.createTicketRequest:
    properties:
      category_id:
        type: integer
      description:
        type: string
      priority:
        enum:
        - low
        - medium
        - high
        - critical
        type: string
      title:
        type: string
    required:
    - category_id
    - description
    - title
    type: object
  internal_handlers.createUserRequest:
    properties:
      email:
        type: string
      name:
        type: string
      password:
        minLength: 8
        type: string
      role:
        enum:
        - admin
        - agent
        - customer
        type: string
    required:
    - email
    - name
    - password
    - role
    type: object
  internal_handlers.errorBody:
    properties:
      code:
        example: invalid_credentials
        type: string
      message:
        example: credenciais inválidas
        type: string
    type: object
  internal_handlers.errorEnvelope:
    properties:
      error:
        $ref: '#/definitions/internal_handlers.errorBody'
    type: object
  internal_handlers.loginRequest:
    properties:
      email:
        type: string
      password:
        type: string
      slug:
        type: string
    required:
    - email
    - password
    - slug
    type: object
  internal_handlers.meResponse:
    properties:
      user:
        $ref: '#/definitions/internal_handlers.userResponse'
    type: object
  internal_handlers.refreshRequest:
    properties:
      refresh_token:
        type: string
    required:
    - refresh_token
    type: object
  internal_handlers.registerRequest:
    properties:
      email:
        type: string
      name:
        type: string
      password:
        minLength: 8
        type: string
      slug:
        type: string
      tenant_name:
        type: string
    required:
    - email
    - name
    - password
    - slug
    - tenant_name
    type: object
  internal_handlers.statsResponse:
    properties:
      by_priority:
        additionalProperties:
          format: int64
          type: integer
        type: object
      by_status:
        additionalProperties:
          format: int64
          type: integer
        type: object
      total:
        type: integer
      unassigned_active:
        type: integer
    type: object
  internal_handlers.teamListResponse:
    properties:
      teams:
        items:
          $ref: '#/definitions/internal_handlers.teamResponse'
        type: array
    type: object
  internal_handlers.teamMemberResponse:
    properties:
      id:
        type: integer
      name:
        type: string
      role:
        type: string
    type: object
  internal_handlers.teamResponse:
    properties:
      id:
        type: integer
      members:
        items:
          $ref: '#/definitions/internal_handlers.teamMemberResponse'
        type: array
      name:
        type: string
    type: object
  internal_handlers.tenantResponse:
    properties:
      id:
        type: integer
      name:
        type: string
      slug:
        type: string
    type: object
  internal_handlers.ticketListResponse:
    properties:
      tickets:
        items:
          $ref: '#/definitions/internal_handlers.ticketResponse'
        type: array
    type: object
  internal_handlers.ticketResponse:
    properties:
      assigned_team_id:
        type: integer
      assigned_to:
        type: integer
      category_id:
        type: integer
      closed_at:
        type: string
      created_at:
        type: string
      created_by:
        type: integer
      description:
        type: string
      id:
        type: integer
      priority:
        type: string
      resolved_at:
        type: string
      status:
        type: string
      title:
        type: string
      updated_at:
        type: string
    type: object
  internal_handlers.updateTicketRequest:
    properties:
      assigned_team_id:
        type: integer
      assigned_to:
        type: integer
      category_id:
        type: integer
      description:
        minLength: 1
        type: string
      priority:
        enum:
        - low
        - medium
        - high
        - critical
        type: string
      status:
        enum:
        - open
        - in_progress
        - waiting_customer
        - resolved
        - closed
        type: string
      title:
        minLength: 1
        type: string
    type: object
  internal_handlers.userAdminResponse:
    properties:
      created_at:
        type: string
      email:
        type: string
      id:
        type: integer
      is_active:
        type: boolean
      name:
        type: string
      role:
        type: string
    type: object
  internal_handlers.userListResponse:
    properties:
      users:
        items:
          $ref: '#/definitions/internal_handlers.userAdminResponse'
        type: array
    type: object
  internal_handlers.userResponse:
    properties:
      email:
        type: string
      id:
        type: integer
      name:
        type: string
      role:
        type: string
    type: object
info:
  contact: {}
  description: |-
    SaaS multi-tenant de gestão de chamados (help desk / service desk).
    Autenticação via Bearer JWT: obtenha o access_token em /auth/register ou /auth/login e informe-o em "Authorize".
  title: Obsidian Chamados API
  version: 0.3.0
paths:
  /assignees:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_handlers.assignableListResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/internal_handlers.errorEnvelope'
      security:
      - Bearer: []
      summary: Lista usuários atribuíveis a tickets (staff)
      tags:
      - users
  /auth/login:
    post:
      consumes:
      - application/json
      parameters:
      - description: Credenciais
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_handlers.loginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_handlers.authResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/internal_handlers.errorEnvelope'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/internal_handlers.errorEnvelope'
      summary: Autentica um usuário (por slug do tenant)
      tags:
      - auth
  /auth/logout:
    post:
      consumes:
      - application/json
      parameters:
      - description: Refresh token
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_handlers.refreshRequest'
      responses:
        "204":
          description: Sem conteúdo
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/internal_handlers.errorEnvelope'
      summary: Revoga um refresh token (logout)
      tags:
      - auth
  /auth/refresh:
    post:
      consumes:
      - application/json
      parameters:
      - description: Refresh token
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_handlers.refreshRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_handlers.authResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/internal_handlers.errorEnvelope'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/internal_handlers.errorEnvelope'
      summary: Rotaciona o refresh token e emite novo par
      tags:
      - auth
  /auth/register:
    post:
      consumes:
      - application/json
      parameters:
      - description: Dados do registro
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_handlers.registerRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/internal_handlers.authResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/internal_handlers.errorEnvelope'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/internal_handlers.errorEnvelope'
      summary: Registra um novo tenant e seu usuário admin
      tags:
      - auth
  /categories:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_handlers.categoryListResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/internal_handlers.errorEnvelope'
      security:
      - Bearer: []
      summary: Lista as categorias do tenant
      tags:
      - categories
    post:
      consumes:
      - application/json
      parameters:
      - description: Nome da categoria
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_handlers.createCategoryRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/internal_handlers.categoryResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/internal_handlers.errorEnvelope'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/internal_handlers.errorEnvelope'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/internal_handlers.errorEnvelope'
      security:
      - Bearer: []
      summary: Cria uma categoria (admin)
      tags:
      - categories
  /me:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_handlers.meResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/internal_handlers.errorEnvelope'
      security:
      - Bearer: []
      summary: Usuário autenticado
      tags:
      - auth
  /stats:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_handlers.statsResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/internal_handlers.errorEnvelope'
      security:
      - Bearer: []
      summary: Métricas de tickets (escopo do papel)
      tags:
      - tickets
  /teams:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_handlers.teamListResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/internal_handlers.errorEnvelope'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/internal_handlers.errorEnvelope'
      security:
      - Bearer: []
      summary: Lista as equipes do tenant com membros (staff)
      tags:
      - teams
    post:
      consumes:
      - application/json
      parameters:
      - description: Nome da equipe
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_handlers.createTeamRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/internal_handlers.teamResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/internal_handlers.errorEnvelope'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/internal_handlers.errorEnvelope'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/internal_handlers.errorEnvelope'
      security:
      - Bearer: []
      summary: Cria uma equipe (admin)
      tags:
      - teams
  /teams/{id}/members:
    post:
      consumes:
      - application/json
      parameters:
      - description: ID da equipe
        in: path
        name: id
        required: true
        type: integer
      - description: Usuário a vincular
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_handlers.addTeamMemberRequest'
      produces:
      - application/json
      responses:
        "204":
          description: membro vinculado
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/internal_handlers.errorEnvelope'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/internal_handlers.errorEnvelope'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/internal_handlers.errorEnvelope'
        "422":
          description: Unprocessable Entity
          schema:
            $ref: '#/definitions/internal_handlers.errorEnvelope'
      security:
      - Bearer: []
      summary: Adiciona um membro à equipe (admin)
      tags:
      - teams
  /teams/{id}/members/{userID}:
    delete:
      parameters:
      - description: ID da equipe
        in: path
        name: id
        required: true
        type: integer
      - description: ID do usuário
        in: path
        name: userID
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "204":
          description: membro desvinculado
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/internal_handlers.errorEnvelope'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/internal_handlers.errorEnvelope'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/internal_handlers.errorEnvelope'
      security:
      - Bearer: []
      summary: Remove um membro da equipe (admin)
      tags:
      - teams
  /tickets:
    get:
      parameters:
      - description: Filtra por status
        enum:
        - open
        - in_progress
        - waiting_customer
        - resolved
        - closed
        in: query
        name: status
        type: string
      - description: Filtra por prioridade
        enum:
        - low
        - medium
        - high
        - critical
        in: query
        name: priority
        type: string
      - description: Filtra por responsável (id)
        in: query
        name: assigned_to
        type: integer
      - description: Filtra por equipe (id)
        in: query
        name: team_id
        type: integer
      - description: Busca por texto em título/descrição
        in: query
        name: q
        type: string
      - description: Tamanho da página (máx. 50)
        in: query
        name: limit
        type: integer
      - description: Deslocamento
        in: query
        name: offset
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_handlers.ticketListResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/internal_handlers.errorEnvelope'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/internal_handlers.errorEnvelope'
      security:
      - Bearer: []
      summary: Lista tickets (customer vê só os próprios)
      tags:
      - tickets
    post:
      consumes:
      - application/json
      parameters:
      - description: Dados do ticket
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_handlers.createTicketRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/internal_handlers.ticketResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/internal_handlers.errorEnvelope'
        "422":
          description: Unprocessable Entity
          schema:
            $ref: '#/definitions/internal_handlers.errorEnvelope'
      security:
      - Bearer: []
      summary: Abre um ticket
      tags:
      - tickets
  /tickets/{id}:
    get:
      parameters:
      - description: ID do ticket
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_handlers.ticketResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/internal_handlers.errorEnvelope'
      security:
      - Bearer: []
      summary: Detalha um ticket
      tags:
      - tickets
    patch:
      consumes:
      - application/json
      description: Customer só edita título/descrição do próprio; agent/admin editam
        todos os campos.
      parameters:
      - description: ID do ticket
        in: path
        name: id
        required: true
        type: integer
      - description: Campos a atualizar
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_handlers.updateTicketRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_handlers.ticketResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/internal_handlers.errorEnvelope'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/internal_handlers.errorEnvelope'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/internal_handlers.errorEnvelope'
        "422":
          description: Unprocessable Entity
          schema:
            $ref: '#/definitions/internal_handlers.errorEnvelope'
      security:
      - Bearer: []
      summary: Atualiza um ticket (parcial)
      tags:
      - tickets
  /tickets/{id}/comments:
    get:
      parameters:
      - description: ID do ticket
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_handlers.commentListResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/internal_handlers.errorEnvelope'
      security:
      - Bearer: []
      summary: Lista comentários de um ticket
      tags:
      - comments
    post:
      consumes:
      - application/json
      parameters:
      - description: ID do ticket
        in: path
        name: id
        required: true
        type: integer
      - description: Comentário
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_handlers.createCommentRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/internal_handlers.commentResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/internal_handlers.errorEnvelope'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/internal_handlers.errorEnvelope'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/internal_handlers.errorEnvelope'
      security:
      - Bearer: []
      summary: Comenta em um ticket
      tags:
      - comments
  /users:
    get:
      parameters:
      - description: Tamanho da página (máx. 50)
        in: query
        name: limit
        type: integer
      - description: Deslocamento
        in: query
        name: offset
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_handlers.userListResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/internal_handlers.errorEnvelope'
      security:
      - Bearer: []
      summary: Lista usuários do tenant (admin)
      tags:
      - users
    post:
      consumes:
      - application/json
      parameters:
      - description: Dados do usuário
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_handlers.createUserRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/internal_handlers.userAdminResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/internal_handlers.errorEnvelope'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/internal_handlers.errorEnvelope'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/internal_handlers.errorEnvelope'
      security:
      - Bearer: []
      summary: Cria um usuário (admin)
      tags:
      - users
  /users/{id}:
    delete:
      parameters:
      - description: ID do usuário
        in: path
        name: id
        required: true
        type: integer
      responses:
        "204":
          description: Sem conteúdo
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/internal_handlers.errorEnvelope'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/internal_handlers.errorEnvelope'
      security:
      - Bearer: []
      summary: Desativa um usuário (admin)
      tags:
      - users
securityDefinitions:
  Bearer:
    description: 'Informe o token no formato: Bearer {access_token}'
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
