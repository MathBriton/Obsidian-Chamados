version: "2"
sql:
  - engine: "sqlite"
    schema: "migrations"
    queries: "sql/queries"
    gen:
      go:
        package: "db"
        out: "internal/db"
        emit_json_tags: true
        emit_empty_slices: true
        emit_interface: true
        overrides:
          - db_type: "DATETIME"
            go_type: "time.Time"
          - db_type: "DATETIME"
            nullable: true
            go_type:
              import: "database/sql"
              type: "NullTime"
          - db_type: "BOOLEAN"
            go_type: "bool"
